services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: parul
      POSTGRES_USER: parul
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --data-checksums
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parul -d parul"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - parul_postgres:/var/lib/postgresql
    networks: [private]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: https://${APP_DOMAIN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - parul_media:/data
    networks: [private, edge]

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        && mc mb --ignore-existing local/parul-media
    restart: "no"
    networks: [private]

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://parul:${POSTGRES_PASSWORD}@postgres:5432/parul
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?Set ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      CORS_ORIGINS: https://${APP_DOMAIN}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: https://${MEDIA_DOMAIN}
      S3_REGION: us-east-1
      S3_BUCKET: parul-media
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_PUBLIC_BASE_URL: https://${MEDIA_DOMAIN}/parul-media
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    init: true
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp"]
    networks: [private, edge]

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_URL: https://${APP_DOMAIN}/v1
    restart: unless-stopped
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /var/cache/nginx
      - /var/run
    networks: [edge]

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN}
      MEDIA_DOMAIN: ${MEDIA_DOMAIN:?Set MEDIA_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks: [edge]

networks:
  private:
    internal: true
  edge:

volumes:
  parul_postgres:
  parul_media:
  caddy_data:
  caddy_config:
